<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Service - Teste de Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e1e5e9;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e1e5e9;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .token-display {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .hidden {
            display: none;
        }

        .user-info {
            background: #e8f5e8;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .user-info h3 {
            color: #155724;
            margin-bottom: 10px;
        }

        .user-info p {
            color: #155724;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Auth Service</h1>
            <p>Sistema de Autenticação - Teste</p>
        </div>

        <div id="status" class="status hidden"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Registrar</div>
        </div>

        <!-- Login Form -->
        <div id="login-tab" class="tab-content active">
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha:</label>
                    <input type="password" id="loginPassword" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-tab" class="tab-content">
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName">Nome:</label>
                    <input type="text" id="registerName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email:</label>
                    <input type="email" id="registerEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Senha:</label>
                    <input type="password" id="registerPassword" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrar</button>
            </form>
        </div>

        <!-- User Info (shown after login) -->
        <div id="userInfo" class="user-info hidden">
            <h3>👤 Informações do Usuário</h3>
            <p><strong>ID:</strong> <span id="userId"></span></p>
            <p><strong>Nome:</strong> <span id="userName"></span></p>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Role:</strong> <span id="userRole"></span></p>
        </div>

        <!-- Token Display -->
        <div id="tokenDisplay" class="token-display hidden">
            <h4>🔑 Tokens:</h4>
            <p><strong>Access Token:</strong></p>
            <div id="accessToken"></div>
            <p><strong>Refresh Token:</strong></p>
            <div id="refreshToken"></div>
            <p><strong>Expires In:</strong> <span id="expiresIn"></span> segundos</p>
        </div>

        <!-- Actions (shown after login) -->
        <div id="actions" class="hidden">
            <button onclick="refreshToken()" class="btn btn-secondary">🔄 Renovar Token</button>
            <button onclick="logout()" class="btn btn-secondary">🚪 Logout</button>
            <button onclick="listUsers()" class="btn btn-secondary">👥 Listar Usuários</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        let currentTokens = null;
        let currentUser = null;

        // Tab switching
        function switchTab(tabName) {
            // Remove active class from all tabs and contents
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active class to selected tab and content
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        // Show status message
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                status.classList.add('hidden');
            }, 5000);
        }

        // API calls
        async function apiCall(url, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${url}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });

                const data = await response.text();
                let jsonData;
                try {
                    jsonData = JSON.parse(data);
                } catch (e) {
                    jsonData = data;
                }

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${jsonData.message || jsonData || 'Erro desconhecido'}`);
                }

                return jsonData;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const loginData = {
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                showStatus('Fazendo login...', 'info');
                
                const response = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify(loginData)
                });

                currentTokens = response;
                showStatus('Login realizado com sucesso!', 'success');
                
                // Decode JWT to get user info
                const payload = JSON.parse(atob(response.accessToken.split('.')[1]));
                currentUser = {
                    id: payload.sub,
                    email: payload.email,
                    role: payload.role
                };

                displayUserInfo();
                displayTokens();
                showActions();
                
            } catch (error) {
                showStatus(`Erro no login: ${error.message}`, 'error');
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const registerData = {
                name: formData.get('name'),
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                showStatus('Registrando usuário...', 'info');
                
                const response = await apiCall('/users', {
                    method: 'POST',
                    body: JSON.stringify(registerData)
                });

                showStatus('Usuário registrado com sucesso!', 'success');
                
                // Clear form
                e.target.reset();
                
                // Switch to login tab
                switchTab('login');
                
                // Pre-fill email
                document.getElementById('loginEmail').value = registerData.email;
                
            } catch (error) {
                showStatus(`Erro no registro: ${error.message}`, 'error');
            }
        });

        // Display user info
        function displayUserInfo() {
            if (currentUser) {
                document.getElementById('userId').textContent = currentUser.id;
                document.getElementById('userName').textContent = currentUser.name || 'N/A';
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('userRole').textContent = currentUser.role;
                document.getElementById('userInfo').classList.remove('hidden');
            }
        }

        // Display tokens
        function displayTokens() {
            if (currentTokens) {
                document.getElementById('accessToken').textContent = currentTokens.accessToken;
                document.getElementById('refreshToken').textContent = currentTokens.refreshToken;
                document.getElementById('expiresIn').textContent = currentTokens.expiresIn;
                document.getElementById('tokenDisplay').classList.remove('hidden');
            }
        }

        // Show actions
        function showActions() {
            document.getElementById('actions').classList.remove('hidden');
        }

        // Refresh token
        async function refreshToken() {
            if (!currentTokens?.refreshToken) {
                showStatus('Nenhum refresh token disponível', 'error');
                return;
            }

            try {
                showStatus('Renovando token...', 'info');
                
                const response = await apiCall('/auth/refresh', {
                    method: 'POST',
                    body: JSON.stringify({
                        refreshToken: currentTokens.refreshToken
                    })
                });

                currentTokens = response;
                displayTokens();
                showStatus('Token renovado com sucesso!', 'success');
                
            } catch (error) {
                showStatus(`Erro ao renovar token: ${error.message}`, 'error');
            }
        }

        // Logout
        async function logout() {
            if (!currentTokens?.refreshToken) {
                showStatus('Nenhum refresh token disponível', 'error');
                return;
            }

            try {
                showStatus('Fazendo logout...', 'info');
                
                await apiCall('/auth/logout', {
                    method: 'POST',
                    body: JSON.stringify({
                        refreshToken: currentTokens.refreshToken
                    })
                });

                // Clear data
                currentTokens = null;
                currentUser = null;
                
                // Hide elements
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('tokenDisplay').classList.add('hidden');
                document.getElementById('actions').classList.add('hidden');
                
                showStatus('Logout realizado com sucesso!', 'success');
                
            } catch (error) {
                showStatus(`Erro no logout: ${error.message}`, 'error');
            }
        }

        // List users
        async function listUsers() {
            try {
                showStatus('Listando usuários...', 'info');
                
                const response = await apiCall('/users');
                
                let userList = 'Usuários cadastrados:\n\n';
                if (response.content && response.content.length > 0) {
                    response.content.forEach(user => {
                        userList += `• ${user.name} (${user.email}) - ${user.role}\n`;
                    });
                } else {
                    userList += 'Nenhum usuário encontrado.';
                }
                
                showStatus(userList, 'info');
                
            } catch (error) {
                showStatus(`Erro ao listar usuários: ${error.message}`, 'error');
            }
        }

        // Test API connection on load
        window.addEventListener('load', async () => {
            try {
                await apiCall('/hello');
                showStatus('Conectado à API com sucesso!', 'success');
            } catch (error) {
                showStatus(`Erro ao conectar com a API: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
